services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  order-api:
    build: ./src/order-api
    ports:
      - "5000:5000"
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka

  order-processor:
    build: ./src/order-processor
    environment:
      KAFKA_BROKER: kafka:9092
      ORDER_API_URL: http://order-api:5000
    depends_on:
      - kafka
      - order-api

  data-pipeline-service:
    build: ./data-pipeline-service
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/analytics
    depends_on:
      - kafka
      - postgres

  analytics-backend:
    build: ./analytics-backend
    ports:
      - "4000:4000"
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/analytics
      PORT: 4000
    depends_on:
      - kafka
      - postgres

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - analytics-backend
